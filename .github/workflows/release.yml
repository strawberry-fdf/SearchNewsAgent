# ============================================================
# GitHub Actions: 三平台构建并自动发布 GitHub Release
# ============================================================
# 触发条件: 推送 v* 标签 (如 v1.0.0)

name: Build & Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            frontend/pnpm-lock.yaml

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装 Node 依赖
        run: pnpm install --frozen-lockfile

      - name: 创建并准备 Python 虚拟环境 (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pyinstaller

      - name: 创建并准备 Python 虚拟环境 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m venv venv
          .\venv\Scripts\python -m pip install --upgrade pip
          .\venv\Scripts\pip install -r backend/requirements.txt pyinstaller

      # ── 分步构建（每步独立，失败可精确定位） ──────────────
      - name: 构建前端 (Next.js 静态导出)
        run: pnpm --prefix frontend build:electron

      - name: 打包后端 (PyInstaller)
        run: node scripts/build-backend.mjs --${{ matrix.platform }}

      - name: 打包桌面应用 (electron-builder)
        env:
          # macOS: 跳过代码签名（CI 无证书）
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --${{ matrix.platform }} --publish=never

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/*.blockmap
            dist/*.yml
            dist/*.yaml
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: 列出下载的产物（调试）
        run: find release-assets -type f | head -50

      - name: 发布 GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.zip
            release-assets/**/*.exe
            release-assets/**/*.AppImage
            release-assets/**/*.deb
            release-assets/**/*.blockmap
            release-assets/**/*.yml
            release-assets/**/*.yaml
