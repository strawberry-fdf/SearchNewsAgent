# ============================================================
# electron-builder 配置 —— AgentNews 桌面应用打包
# ============================================================
# 文档: https://www.electron.build/configuration

appId: "com.agentnews.desktop"
productName: "AgentNews"
copyright: "Copyright © 2024-2026 strawberry-fdf"

# ── 目录 ─────────────────────────────────────────────────────
directories:
  output: dist
  buildResources: build

# ── 通用文件（Electron 主进程代码） ────────────────────────────
files:
  - "electron/**/*"
  - "package.json"
  - "!frontend"
  - "!backend"
  - "!scripts"
  - "!venv"
  - "!.github"

# ── 额外资源（与 app.asar 同级的 resources 目录） ─────────────
extraResources:
  # PyInstaller 打包后的后端可执行程序
  - from: "build/backend/"
    to: "backend"
    filter:
      - "**/*"
      - "!**/*.db"
      - "!**/*.sqlite"
      - "!**/*.sqlite3"
      - "!**/__pycache__/**"
      - "!**/venv/**"
  # Next.js 静态导出的前端文件
  - from: "frontend/out/"
    to: "frontend"
    filter:
      - "**/*"
  # 默认环境变量模板（首次启动时复制到用户数据目录）
  - from: "build/default.env"
    to: "default.env"

# ── ASAR 打包 ────────────────────────────────────────────────
asar: true
asarUnpack:
  - "electron/preload.js"

# ── macOS 配置 ─────────────────────────────────────────────────
# 注意: 未签名的 macOS 应用无法使用 autoUpdater 静默更新
# 应用内将检测新版本并引导用户手动下载安装
mac:
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  artifactName: "${productName}-${version}-mac-${arch}.${ext}"
  category: "public.app-category.news"
  darkModeSupport: true

dmg:
  artifactName: "${productName}-${version}-mac.dmg"
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# ── Windows 配置 ──────────────────────────────────────────────
win:
  target:
    - target: portable
      arch:
        - x64
  artifactName: "${productName}-${version}-win-${arch}.${ext}"

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "AgentNews"
  license: null

portable:
  artifactName: "${productName}-${version}-portable.${ext}"

# ── Linux 配置 ────────────────────────────────────────────────
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: "Utility;Network"
  artifactName: "${productName}-${version}-linux-${arch}.${ext}"
  desktop:
    Name: "AgentNews"
    Comment: "AI 智能资讯精选系统"
    Terminal: false
    Type: Application
    Categories: "Utility;Network"

appImage:
  artifactName: "${productName}-${version}.AppImage"

deb:
  artifactName: "${productName}-${version}-amd64.deb"
  depends:
    - "libgtk-3-0"
    - "libnotify4"
    - "libnss3"
    - "libxss1"
    - "libxtst6"
    - "xdg-utils"
    - "libatspi2.0-0"
    - "libuuid1"

# ── 发布配置（GitHub Releases） ───────────────────────────────
# 通过 git tag (v*) 触发 CI 构建并上传到 GitHub Releases
# 私有仓库需设置 GH_TOKEN 环境变量
publish:
  provider: github
  owner: strawberry-fdf
  repo: SearchNewsAgent
  releaseType: release
