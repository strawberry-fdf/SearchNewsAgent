version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: agentnews-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: agent_news

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agentnews-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
    env_file:
      - ./backend/.env
    environment:
      MONGO_URI: mongodb://mongodb:27017

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agentnews-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo_data:
